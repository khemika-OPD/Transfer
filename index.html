<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takhli OPD Smart Queue - นวัตกรรมระบบคิวเปลอัจฉริยะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #0288d1; --success-color: #2e7d32; --normal-queue-color: #ffb74d; --urgent-queue-color: #d32f2f; --bg-color: #f4f6f9; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #01579b, #0288d1); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; flex: 1; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-success { background-color: var(--success-color); color: white; }
        .footer-credit { text-align: center; padding: 10px; font-size: 11px; color: #888; margin-top: auto; }
        .app-mode { display: none; }
        .app-mode.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏥 นวัตกรรมระบบคิวเปลอัจฉริยะ (Smart Queue)</h2>
        <p>กลุ่มงานผู้ป่วยนอก (OPD) โรงพยาบาลตาคลี</p>
    </div>

    <div class="container">
        <!-- ส่วน Nurse/Staff Mode เดิมของพี่ วางที่นี่ -->
        <div id="nurseModeSection" class="app-mode active">
            <div class="card">
                <!-- ใส่ฟอร์มพยาบาลเดิมของพี่ที่นี่ -->
            </div>
        </div>

        <div id="staffModeSection" class="app-mode">
            <div id="queueList"></div>
        </div>

        <!-- ปุ่มเปิด QR Code -->
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-success" style="width: auto; padding: 10px 20px;" onclick="toggleQR()">
                <i class="fa-solid fa-qrcode"></i> QR Code เข้าใช้งาน
            </button>
        </div>

        <!-- QR Zone -->
        <div id="qrZone" class="card" style="display: none; text-align: center; margin-top: 15px;">
            <p>สแกนเพื่อเปิดระบบ</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://YOUR_GITHUB_URL" alt="QR Code">
        </div>
    </div>

    <div class="footer-credit">
        Innovation by Khemika-OPD-Takhli 06/2026
    </div>

    <script>
        // ฟังก์ชัน Toggle QR
        function toggleQR() {
            const z = document.getElementById("qrZone");
            z.style.display = (z.style.display === "none") ? "block" : "none";
        }

        // ฟังก์ชันเดิมของพี่ทั้งหมด (วางต่อจากตรงนี้)
        // ... (ใส่ฟังก์ชัน sendJob, acceptJob, fetchData ฯลฯ ของพี่ที่นี่) ...
    </script>
</body>
</html>
